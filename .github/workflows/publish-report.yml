name: Publish Report

on:
  push:
    branches: [master]
  repository_dispatch:
    types: [kensa-release]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Resolve Kensa version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            KENSA_VERSION="${{ github.event.client_payload.version }}"
          else
            KENSA_VERSION=$(curl -s https://repo1.maven.org/maven2/dev/kensa/kensa-framework-junit6/maven-metadata.xml | grep -oP '(?<=<release>)[^<]+')
          fi
          echo "version=$KENSA_VERSION" >> $GITHUB_OUTPUT

      - name: Wait for version on Maven Central
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          URL="https://repo1.maven.org/maven2/dev/kensa/kensa-framework-junit6/${VERSION}/kensa-framework-junit6-${VERSION}.pom"
          echo "Waiting for $VERSION to appear on Maven Central..."
          for i in $(seq 1 20); do
            if curl -sf "$URL" > /dev/null; then
              echo "Version $VERSION is available"
              exit 0
            fi
            echo "Attempt $i: not yet available, waiting 60s..."
            sleep 60
          done
          echo "Timed out waiting for $VERSION on Maven Central"
          exit 1

      - name: Set Kensa version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/kensa\s*=\s*\"SNAPSHOT\"/kensa = \"$VERSION\"/" gradle/libs.versions.toml

      - name: Build and run tests
        run: ./gradlew test

      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/kensa-output
