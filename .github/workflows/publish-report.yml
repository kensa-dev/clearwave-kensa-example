name: Publish Report

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Set Kensa version
        run: sed -i 's/kensa\s*=\s*"SNAPSHOT"/kensa = "0.6.1"/' gradle/libs.versions.toml

      - name: Build and run tests
        run: ./gradlew test

      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/kensa-output
